<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kør nu?">
<meta name="theme-color" content="#0D1B2A">
<meta name="description" content="Live færgetrafik — Sjællands Odde. Undgå køen på Gnibenvej.">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Kør nu? — Odden Færge</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0D1B2A;
  --bg2:      #152232;
  --bg3:      #1C2E42;
  --card:     #1A2D40;
  --teal:     #0EA5A0;
  --teal2:    #0BC5BF;
  --teal-dim: rgba(14,165,160,0.15);
  --teal-dim2:rgba(14,165,160,0.08);
  --amber:    #F59E0B;
  --red:      #EF4444;
  --green:    #22C55E;
  --text:     #E8F4F8;
  --text2:    #8BAFC4;
  --text3:    #4A6B80;
  --border:   rgba(14,165,160,0.18);
  --border2:  rgba(232,244,248,0.08);
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}
html{-webkit-text-size-adjust:100%;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bot);
  overflow-x:hidden;
}

/* ── HEADER ───────────────────────────────────────── */
.header{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:12px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.header-wordmark{
  display:flex;align-items:center;gap:8px;
}
.wordmark-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--teal);
  box-shadow:0 0 8px var(--teal);
  flex-shrink:0;
}
.wordmark-dot.dead{background:var(--text3);box-shadow:none}
.header-title{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.header-right{display:flex;align-items:center;gap:10px}
.lang-row{display:flex;gap:4px}
.lang-btn{
  padding:4px 9px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all .15s;
}
.lang-btn.active{background:var(--teal);color:var(--bg);border-color:var(--teal)}

/* ── LAYOUT ───────────────────────────────────────── */
.content{padding:14px 14px 32px;max-width:440px;margin:0 auto}

/* ── CLOCK ────────────────────────────────────────── */
.clock-bar{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:14px;
}
.clock-time{
  font-size:44px;font-weight:300;letter-spacing:-1px;
  color:var(--text);font-variant-numeric:tabular-nums;
  line-height:1;
}
.clock-time span{font-size:28px;color:var(--text2)}
.clock-right{text-align:right}
.clock-date{font-size:13px;color:var(--text2);line-height:1.3}
.clock-updated{font-size:11px;color:var(--text3);margin-top:2px}

/* ── STATUS CARD (the hero) ───────────────────────── */
.status-wrap{position:relative;margin-bottom:14px}

/* Radar ring — pulses when ferry approaching */
.radar-ring{
  position:absolute;inset:-8px;border-radius:22px;
  border:1.5px solid transparent;pointer-events:none;
  transition:border-color .4s;
}
.radar-ring.active{
  border-color:rgba(239,68,68,0.4);
  animation:radar 2s ease-out infinite;
}
.radar-ring.caution{
  border-color:rgba(245,158,11,0.4);
  animation:radar 3s ease-out infinite;
}
@keyframes radar{
  0%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)}
  70%{box-shadow:0 0 0 12px rgba(239,68,68,0)}
  100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}
}
.radar-ring.caution{animation-name:radar-amber}
@keyframes radar-amber{
  0%{box-shadow:0 0 0 0 rgba(245,158,11,0.3)}
  70%{box-shadow:0 0 0 12px rgba(245,158,11,0)}
  100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}
}

.status-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px 16px 16px;
  position:relative;overflow:hidden;
}
.status-card::before{
  content:'';position:absolute;inset:0;border-radius:16px;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.status-card.green::before{background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,0.12) 0%,transparent 70%)}
.status-card.red::before{background:radial-gradient(ellipse at 50% 0%,rgba(239,68,68,0.14) 0%,transparent 70%)}
.status-card.yellow::before{background:radial-gradient(ellipse at 50% 0%,rgba(245,158,11,0.12) 0%,transparent 70%)}
.status-card.green::before,.status-card.red::before,.status-card.yellow::before{opacity:1}

.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;margin-bottom:10px;
}
.green .status-pill{background:rgba(34,197,94,.18);color:#4ADE80;border:1px solid rgba(34,197,94,.3)}
.red   .status-pill{background:rgba(239,68,68,.18);color:#F87171;border:1px solid rgba(239,68,68,.3)}
.yellow .status-pill{background:rgba(245,158,11,.18);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}

.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.2s ease-in-out infinite}
.green .pill-dot{animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.status-main{font-size:22px;font-weight:600;line-height:1.2;margin-bottom:6px;color:var(--text)}
.status-sub{font-size:13px;line-height:1.6;color:var(--text2)}
.status-sub strong{color:var(--text);font-weight:500}

.source-line{
  display:flex;align-items:center;gap:5px;margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border2);font-size:11px;color:var(--text3);
}
.source-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.source-dot.live{background:var(--teal);box-shadow:0 0 4px var(--teal)}

/* ── SECTION LABELS ───────────────────────────────── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.section-action{font-size:12px;color:var(--teal);cursor:pointer;background:none;border:none;padding:0}

/* ── FERRY TIMELINE ───────────────────────────────── */
.timeline{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.ferry-card{
  background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:12px 13px;display:flex;align-items:flex-start;gap:12px;
  transition:border-color .2s;
}
.ferry-card.arriving{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.05)}
.ferry-card.soon{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.04)}
.ferry-card.clear{border-color:rgba(14,165,160,.2)}
.ferry-card.past{opacity:.35}

.ferry-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;margin-top:1px;
}
.arriving .ferry-icon{background:rgba(239,68,68,.15)}
.soon     .ferry-icon{background:rgba(245,158,11,.15)}
.clear    .ferry-icon{background:var(--teal-dim2)}
.past     .ferry-icon{background:var(--bg2)}

.ferry-body{flex:1;min-width:0}
.ferry-ship{font-size:11px;color:var(--text3);margin-bottom:2px;display:flex;align-items:center;gap:5px}
.ferry-ship-tag{
  font-size:10px;padding:1px 6px;border-radius:8px;
  background:var(--teal-dim);color:var(--teal);font-weight:500;
}
.ferry-times{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.arriving .ferry-times{color:#F87171}
.soon     .ferry-times{color:#FCD34D}
.clear    .ferry-times{color:#86EFAC}
.ferry-meta{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ferry-meta span{display:flex;align-items:center;gap:3px}

.ferry-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
  flex-shrink:0;align-self:flex-start;margin-top:2px;white-space:nowrap;letter-spacing:.04em;
}
.b-arriving{background:rgba(239,68,68,.2);color:#FCA5A5;border:1px solid rgba(239,68,68,.3)}
.b-soon    {background:rgba(245,158,11,.2);color:#FDE68A;border:1px solid rgba(245,158,11,.3)}
.b-before  {background:rgba(14,165,160,.2);color:var(--teal2);border:1px solid rgba(14,165,160,.3)}
.b-clear   {background:rgba(34,197,94,.15);color:#86EFAC;border:1px solid rgba(34,197,94,.25)}
.b-past    {background:var(--bg2);color:var(--text3);border:1px solid var(--border2)}

/* Load bar */
.load-bar-wrap{margin-top:7px;display:flex;align-items:center;gap:7px}
.load-bar-track{flex:1;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden}
.load-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.load-label{font-size:10px;font-weight:600;min-width:46px;text-align:right}
.load-low    .load-bar-fill{background:var(--green)}
.load-low    .load-label{color:var(--green)}
.load-moderate .load-bar-fill{background:var(--amber)}
.load-moderate .load-label{color:var(--amber)}
.load-heavy  .load-bar-fill{background:var(--red)}
.load-heavy  .load-label{color:var(--red)}

/* ── POPULAR TIMES CHART ──────────────────────────── */
.chart-card{
  background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:14px;margin-bottom:14px;
}
.day-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:12px;
  border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.day-tab.active{background:var(--teal);color:var(--bg);border-color:var(--teal);font-weight:600}
.chart-wrap{display:flex;align-items:flex-end;gap:3px;height:56px;padding:0 2px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-bar{width:100%;border-radius:3px 3px 0 0;transition:height .3s ease,background .3s;min-height:2px}
.chart-bar.current{background:var(--teal)!important;box-shadow:0 0 6px var(--teal)}
.chart-label-row{display:flex;justify-content:space-between;padding:0 2px;margin-top:4px}
.chart-label{font-size:10px;color:var(--text3)}
.chart-peak{font-size:11px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:4px}
.chart-peak-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}

/* ── ADDRESS CARD ─────────────────────────────────── */
.addr-card{
  background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:14px;margin-bottom:14px;
}
.addr-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.addr-row{display:flex;gap:8px}
.addr-input{
  flex:1;font-size:15px;padding:9px 12px;
  border:1px solid var(--border2);border-radius:10px;
  background:var(--bg2);color:var(--text);
  -webkit-appearance:none;outline:none;
  transition:border-color .2s;
}
.addr-input:focus{border-color:var(--teal)}
.addr-input::placeholder{color:var(--text3)}
.addr-save-btn{
  padding:9px 14px;border:1px solid var(--border2);border-radius:10px;
  background:var(--teal);color:var(--bg);font-size:14px;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.addr-save-btn:active{opacity:.8}
.addr-note{font-size:12px;color:var(--text3);margin-top:7px;line-height:1.5}
.addr-saved{font-size:12px;color:var(--teal);margin-top:5px;display:none}

/* ── ASSUMPTIONS ──────────────────────────────────── */
.assumptions-card{
  background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:14px;margin-bottom:14px;
}
.assumptions-trigger{
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.assumptions-trigger span{font-size:13px;color:var(--text2)}
.chevron{font-size:18px;color:var(--text3);transition:transform .2s;line-height:1}
.chevron.open{transform:rotate(180deg)}
.assumptions-body{display:none;margin-top:12px}
.assumptions-body.open{display:block}
.arow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2);font-size:13px}
.arow:last-child{border-bottom:none;padding-bottom:0}
.arow-key{color:var(--text2)}
.arow-val{font-weight:500;color:var(--text)}
.assumptions-note{font-size:12px;color:var(--text3);margin-top:10px;line-height:1.6}

/* ── DISCLAIMER ───────────────────────────────────── */
.disclaimer{
  font-size:11px;color:var(--text3);line-height:1.6;
  border-top:1px solid var(--border2);padding-top:12px;margin-top:4px;
}
.disclaimer a{color:var(--teal);text-decoration:none}

/* ── INSTALL BANNER ───────────────────────────────── */
.install-banner{
  background:var(--teal-dim);border:1px solid rgba(14,165,160,.3);
  border-radius:10px;padding:10px 12px;margin-bottom:12px;
  font-size:13px;color:var(--teal2);line-height:1.5;display:none;cursor:pointer;
}

/* ── REFRESH BTN ──────────────────────────────────── */
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.refresh-time{font-size:11px;color:var(--text3)}
.refresh-btn{
  font-size:12px;color:var(--text2);border:1px solid var(--border2);
  border-radius:8px;padding:5px 11px;background:transparent;cursor:pointer;
  display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;
}
.refresh-btn:active{opacity:.6}

/* ── ONBOARDING OVERLAY ───────────────────────────── */
.onboarding{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;
  animation:fadeIn .3s ease;
}
.onboarding.hidden{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.ob-icon{font-size:48px;margin-bottom:16px}
.ob-title{font-size:24px;font-weight:600;color:var(--text);text-align:center;margin-bottom:8px}
.ob-sub{font-size:15px;color:var(--text2);text-align:center;line-height:1.6;margin-bottom:32px;max-width:300px}
.ob-form{width:100%;max-width:320px}
.ob-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}
.ob-input{
  width:100%;font-size:17px;padding:13px 14px;
  border:1px solid var(--border2);border-radius:12px;
  background:var(--bg2);color:var(--text);
  -webkit-appearance:none;outline:none;margin-bottom:10px;
  transition:border-color .2s;
}
.ob-input:focus{border-color:var(--teal)}
.ob-input::placeholder{color:var(--text3)}
.ob-btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:var(--teal);color:var(--bg);font-size:16px;font-weight:700;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
}
.ob-btn:active{opacity:.8}
.ob-skip{
  margin-top:12px;font-size:13px;color:var(--text3);
  background:none;border:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;width:100%;text-align:center;padding:6px;
}
.ob-note{font-size:12px;color:var(--text3);text-align:center;margin-top:10px;line-height:1.5}
</style>
</head>
<body>

<!-- ── ONBOARDING (shown only on first visit) ─────── -->
<div class="onboarding hidden" id="onboarding">
  <div class="ob-icon">⛴</div>
  <div class="ob-title" id="ob-title">Velkommen</div>
  <div class="ob-sub" id="ob-sub">For at beregne om du kan nå Oddenvej inden færgen, skal vi vide hvor du kører fra.</div>
  <div class="ob-form">
    <label class="ob-label" id="ob-label">Din adresse på Odde</label>
    <input class="ob-input" type="text" id="ob-input" placeholder="Gnibenvej 26" autocomplete="street-address" enterkeyhint="done">
    <button class="ob-btn" onclick="onboardingSave()" id="ob-btn">Gem og start →</button>
    <button class="ob-skip" onclick="onboardingSkip()" id="ob-skip">Spring over — brug standard estimat</button>
    <div class="ob-note" id="ob-note">Adressen gemmes på din enhed og bruges kun til at beregne køretid.</div>
  </div>
</div>

<div class="header">
  <div class="header-wordmark">
    <div class="wordmark-dot" id="live-dot"></div>
    <div class="header-title" id="h-title">Kør nu?</div>
  </div>
  <div class="header-right">
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('da')" id="btn-da">DA</button>
      <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    </div>
  </div>
</div>

<div class="content">

  <!-- Clock -->
  <div class="clock-bar">
    <div class="clock-time" id="clock">--<span>:--</span></div>
    <div class="clock-right">
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-updated" id="clock-updated"></div>
    </div>
  </div>

  <!-- Install banner -->
  <div class="install-banner" id="install-banner" onclick="dismissInstall()"></div>

  <!-- Status hero -->
  <div class="status-wrap">
    <div class="radar-ring" id="radar-ring"></div>
    <div class="status-card" id="status-card">
      <div class="status-pill" id="status-pill"><span class="pill-dot"></span><span id="pill-text">—</span></div>
      <div class="status-main" id="status-main">Henter data…</div>
      <div class="status-sub" id="status-sub"></div>
      <div class="source-line">
        <div class="source-dot" id="source-dot"></div>
        <span id="source-text"></span>
      </div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="section-head">
    <div class="section-label" id="tl-label">Kommende færger</div>
    <button class="section-action" onclick="toggleShowAll()" id="show-all-btn"></button>
  </div>
  <div class="timeline" id="timeline"></div>

  <!-- Refresh row -->
  <div class="refresh-row">
    <span class="refresh-time" id="refresh-time"></span>
    <button class="refresh-btn" onclick="loadData()">↻ <span id="refresh-label">Opdater</span></button>
  </div>

  <!-- Popular times chart -->
  <div class="chart-card">
    <div class="section-head" style="margin-bottom:10px">
      <div class="section-label" id="chart-label">Populære tidspunkter</div>
      <div class="chart-peak" id="chart-peak"></div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
    <div class="chart-wrap" id="chart-wrap"></div>
    <div class="chart-label-row">
      <span class="chart-label">6</span>
      <span class="chart-label">9</span>
      <span class="chart-label">12</span>
      <span class="chart-label">15</span>
      <span class="chart-label">18</span>
      <span class="chart-label">21</span>
    </div>
  </div>

  <!-- Address -->
  <div class="addr-card">
    <div class="addr-title" id="addr-title-label">Din adresse</div>
    <div class="addr-row">
      <input class="addr-input" type="text" id="addr-input" placeholder="Gnibenvej 26" autocomplete="street-address">
      <button class="addr-save-btn" onclick="saveAddress()" id="save-btn">Gem</button>
    </div>
    <div class="addr-note" id="addr-note"></div>
    <div class="addr-saved" id="addr-saved"></div>
  </div>

  <!-- Assumptions -->
  <div class="assumptions-card">
    <div class="assumptions-trigger" onclick="toggleAssumptions()" id="assumptions-trigger">
      <span id="assumptions-title">ℹ Grundlag for estimater</span>
      <span class="chevron" id="chevron">›</span>
    </div>
    <div class="assumptions-body" id="assumptions-body">
      <div id="assumptions-rows"></div>
      <div class="assumptions-note" id="assumptions-note"></div>
    </div>
  </div>

  <!-- Disclaimer -->
  <div class="disclaimer" id="disclaimer"></div>

</div><!-- .content -->

<script>
// ══════════════════════════════════════════════════════════════
// CONSTANTS

// Drive-time lookup by road segment — calibrated against Gnibenvej 26 = 3 min
// (65 km/h road speed, 1.10 road factor on straight peninsula roads)
const ROAD_TIMES = {
  // Gnibenvej by house number zone
  gnibenvej: n => n<=10?6 : n<=20?5 : n<=30?3 : n<=50?2 : 1,
  // Named roads — approximate mid-point drive time to Oddenvej/færge junction
  'strandvejen':4, 'strandvej':4,
  'ulkerupvej':4, 'yderby lyng':4,
  'vestre havnevej':1, 'havnevej':1, 'østre havnevej':2,
  'søndervangsvej':1, 'kastanielys':1,
  'yderbygade':2, 'overby lyng':2,
  'pilehavevej':2, 'strandlodsvej':2,
  'nakke':3, 'rørvigvej':3,
  'lumsåsvej':5, 'egebjergvej':5,
  'oddenvej':2, // already on the main road
};

function estimateDrive(addr){
  if(!addr) return C.defaultDrive;
  const lower = addr.toLowerCase();

  // Gnibenvej — use house number
  if(lower.includes('gnibenvej') || lower.includes('gniben')){
    const m = addr.match(/(\d+)/);
    const n = m ? parseInt(m[1]) : 26;
    return ROAD_TIMES.gnibenvej(n);
  }

  // Check other known roads
  for(const [road, mins] of Object.entries(ROAD_TIMES)){
    if(typeof mins === 'number' && lower.includes(road)) return mins;
  }

  // Unknown road — try to use house number as rough proxy
  // (higher numbers on Odde tend to be closer to Oddenvej)
  const m = addr.match(/(\d+)/);
  if(m){
    const n = parseInt(m[1]);
    if(n <= 10) return 5;
    if(n <= 30) return 3;
    return 2;
  }
  return C.defaultDrive;
}

// FETCH
// ══════════════════════════════════════════════════════════════
async function loadData(){
  let data=null;

  // 1. Try Molslinjen directly from browser (no CORS issue from browser)
  try{
    const r=await fetch(
      'https://new.api.molslinjen.dk/api/v1/ai/markup/data-catalog?language=da&line=0',
      {cache:'no-cache',signal:AbortSignal.timeout(8000)}
    );
    if(r.ok){
      const raw=await r.json();
      data=parseMolslinjen(raw);
    }
  }catch(_){}

  // 2. Fallback: our Netlify proxy
  if(!data||!data.departures?.length){
    try{
      const r=await fetch(C.apiUrl,{cache:'no-cache',signal:AbortSignal.timeout(6000)});
      if(r.ok){data=await r.json();}
    }catch(_){}
  }

  // 3. Final fallback: built-in schedule
  if(!data||!data.departures?.length){
    data=buildFallback();
  }

  lastData=data;
  const now=new Date();
  document.getElementById('clock-updated').textContent=
    `${T[lang].refreshed} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('live-dot').className=
    'wordmark-dot'+(data.hasAIS||data.source==='molslinjen'?' live':'');

  renderAll(data);
}

function parseMolslinjen(raw){
  const today=new Date().toISOString().slice(0,10);
  const SAIL={aarhus:90,ebeltoft:75};
  const deps=[];
  try{
    const items=raw['@graph']||raw.departures||[];
    for(const item of items){
      const dest=(item.arrivalStation||item.toHarbour||item.name||'').toLowerCase();
      if(!dest.includes('odden'))continue;
      const origin=(item.name||'').toLowerCase().includes('ebeltoft')?'ebeltoft':'aarhus';
      let arr=item.arrivalTime?new Date(item.arrivalTime):null;
      if(!arr&&item.departureTime){
        arr=new Date(new Date(item.departureTime).getTime()+SAIL[origin]*60000);
      }
      if(!arr||isNaN(arr)||arr.toISOString().slice(0,10)!==today)continue;
      const shipName=item.shipName||item.vesselName||extractShipName(item.name||'');
      const booked=item.bookedVehicles??item.vehicleCount??null;
      const hour=arr.getHours();
      const isWE=[0,6].includes(arr.getDay());
      const maxCars=FLEET_INFO[shipName]?.maxCars||411;
      const eCars=booked??Math.round(maxCars*(TRAFFIC[isWE?'weekend':'weekday'][hour]||0.5));
      const unload=15+Math.max(0,Math.round((eCars-150)/50));
      deps.push({
        origin,shipName,
        arrivalOdden:arr.toISOString(),scheduledArrival:arr.toISOString(),
        source:'molslinjen',
        estimatedCars:eCars,
        estimatedUnloadMins:unload,
        loadLevel:eCars<200?'low':eCars<300?'moderate':'heavy',
      });
    }
  }catch(_){}
  if(!deps.length)return null;
  deps.sort((a,b)=>new Date(a.arrivalOdden)-new Date(b.arrivalOdden));
  return{ok:true,source:'molslinjen',hasAIS:false,departures:deps,vessels:[]};
}

function extractShipName(str){
  const m=str.match(/express\s*\d/i);
  return m?m[0].replace(/\s+/,' ').replace(/^\w/,c=>c.toUpperCase()):null;
}

function buildFallback(){
  const deps=[];
  // Build 2 days: today + tomorrow
  for(let dayOffset=0; dayOffset<2; dayOffset++){
    const base=new Date();
    base.setHours(0,0,0,0);
    base.setDate(base.getDate()+dayOffset);
    const dow=base.getDay();
    const isWE=[0,6].includes(dow);
    const AR=isWE
      ?[600,660,720,780,840,900,960,1020,1080,1140,1200,1260,1320,1380]
      :[330,390,450,510,570,630,690,750,810,870,930,990,1050,1110,1170,1230];
    const ER=isWE?[660,780,900,1020,1140]:[480,660,780,900,1020,1140];
    const ships2=['Express 2','Express 3','Express 4'];
    const mk=(depMins,sail,origin,ship)=>{
      const d=new Date(base);
      d.setMinutes(depMins+sail);
      const hour=d.getHours();
      const traffic=isWE?TRAFFIC.weekend:TRAFFIC.weekday;
      const maxCars=FLEET_INFO[ship]?.maxCars||411;
      const eCars=Math.round(maxCars*(traffic[hour]||0.5));
      const unload=15+Math.max(0,Math.round((eCars-150)/50));
      return{
        origin,shipName:ship,
        arrivalOdden:d.toISOString(),scheduledArrival:d.toISOString(),
        source:'fallback',estimatedCars:eCars,estimatedUnloadMins:unload,
        loadLevel:eCars<200?'low':eCars<300?'moderate':'heavy',
        isTomorrow:dayOffset===1,
      };
    };
    AR.forEach((m,i)=>deps.push(mk(m,90,'aarhus',ships2[i%3])));
    ER.forEach((m,i)=>deps.push(mk(m,75,'ebeltoft',ships2[i%2])));
  }
  deps.sort((a,b)=>new Date(a.arrivalOdden)-new Date(b.arrivalOdden));
  return{ok:true,source:'fallback',hasAIS:false,departures:deps,vessels:[]};
}

// ══════════════════════════════════════════════════════════════
// DECISION LOGIC
// ══════════════════════════════════════════════════════════════
function getStatus(deps){
  const now=new Date();
  const upcoming=deps.filter(d=>(new Date(d.arrivalOdden)-now)/60000>-90);

  for(const dep of upcoming){
    const arr=new Date(dep.arrivalOdden);
    const minsToArr=(arr-now)/60000;
    const unloadMins=dep.estimatedUnloadMins||C.defaultUnload;
    const blockEnd=minsToArr+unloadMins;

    // Currently blocking
    if(minsToArr<=0 && blockEnd>0){
      return{type:'blocked',minsLeft:Math.round(blockEnd),dep,unloadMins};
    }
    // Upcoming
    if(minsToArr>0){
      const canBefore=driveMinutes<minsToArr;
      // Can just barely make it before
      if(canBefore && minsToArr<=driveMinutes+7){
        return{type:'caution_before',minsToArr:Math.round(minsToArr),dep,unloadMins};
      }
      // Comfortably clear
      return{type:'clear',minsUntilBlock:Math.round(minsToArr),canBefore,dep,unloadMins};
    }
  }
  return{type:'clear',minsUntilBlock:120,canBefore:true,dep:null,unloadMins:C.defaultUnload};
}

const fmt=d=>`${pad(d.getHours())}:${pad(d.getMinutes())}`;

function renderAll(data){
  const t=T[lang];
  const deps=data.departures||[];
  const now=new Date();
  const s=getStatus(deps);

  // ── Status card ──────────────────────────────────────────────
  const card=document.getElementById('status-card');
  const radar=document.getElementById('radar-ring');
  const pill=document.getElementById('status-pill');
  const pillText=document.getElementById('pill-text');
  const main=document.getElementById('status-main');
  const sub=document.getElementById('status-sub');

  card.className='status-card';
  radar.className='radar-ring';

  if(s.type==='blocked'){
    card.classList.add('red'); radar.classList.add('active');
    pillText.textContent=t.wait;
    main.textContent=`${t.wait_blocked} ${s.minsLeft} ${t.min}`;
    const freeTime=fmt(new Date(now.getTime()+s.minsLeft*60000));
    sub.innerHTML=`${t.freeAt} <strong>${freeTime}</strong> · ${t.unload} ${s.unloadMins} ${t.min}`;
  } else if(s.type==='caution_before'){
    card.classList.add('yellow'); radar.classList.add('caution');
    pillText.textContent=t.caution;
    main.textContent=t.caution_msg;
    const freeTime=fmt(new Date(new Date(s.dep.arrivalOdden).getTime()+s.unloadMins*60000));
    const driveNote=driveMinutes!==C.defaultDrive?` · ${t.driveLabel} ~${driveMinutes} ${t.min}`:'';
    sub.innerHTML=`Færge om <strong>${s.minsToArr} ${t.min}</strong> · ${t.freeAt} ${freeTime}${driveNote}`;
  } else {
    card.classList.add('green');
    pillText.textContent=t.goNow;
    const driveNote=driveMinutes!==C.defaultDrive?`${t.driveLabel} ~${driveMinutes} ${t.min} · `:'';
    if(s.dep && s.minsUntilBlock<90){
      main.textContent=`${t.go_clear} ${s.minsUntilBlock} ${t.min}`;
      sub.innerHTML=`${driveNote}blokering kl. <strong>${fmt(new Date(s.dep.arrivalOdden))}</strong> · ${s.dep.shipName||''}`;
    } else {
      main.textContent=t.go_clear.replace('de næste','');
      sub.innerHTML=driveNote?driveNote.replace(' · ',''):'';
    }
  }

  // Source line
  const isDead=!data.ok||data.source==='fallback';
  document.getElementById('live-dot').className='wordmark-dot'+(data.hasAIS?' live':'');
  document.getElementById('source-dot').className='source-dot'+(data.hasAIS||data.source==='molslinjen'?' live':'');
  document.getElementById('source-text').textContent=
    data.hasAIS?t.liveSource:data.source==='molslinjen'?t.schedSource:t.fallbackSource;

  // ── Timeline ─────────────────────────────────────────────────
  const relevant=deps.filter(d=>{
    const diff=(new Date(d.arrivalOdden)-now)/60000;
    return diff>-60 && diff<1440; // show up to 24 hours ahead
  });
  const toShow=showAllFerries?relevant:relevant.slice(0,8);

  let rows='';
  let shownTomorrow=false;
  const todayDate=now.toISOString().slice(0,10);
  toShow.forEach(dep=>{
    const arr=new Date(dep.arrivalOdden);
    // Insert "I morgen" divider
    if(!shownTomorrow && arr.toISOString().slice(0,10)!==todayDate){
      shownTomorrow=true;
      const tomorrowLabel=lang==='da'?'I morgen':'Tomorrow';
      rows+=`<div style="text-align:center;padding:8px 0 4px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em">${tomorrowLabel}</div>`;
    }
    const minsToArr=(arr-now)/60000;
    const unload=dep.estimatedUnloadMins||C.defaultUnload;
    const blockEnd=minsToArr+unload;
    const freeTime=fmt(new Date(arr.getTime()+unload*60000));
    const routeStr=dep.origin==='ebeltoft'?t.routeER:t.routeAR;
    const ship=dep.shipName||'';
    const emoji=FLEET_INFO[ship]?.emoji||'⛴';
    const canBefore=driveMinutes<minsToArr&&minsToArr>0;
    const isDelayed=dep.source==='ais'&&dep.delayMins&&Math.abs(dep.delayMins)>2;

    let rowClass,badgeClass,badgeText;
    if(minsToArr<=0&&blockEnd>0){
      rowClass='arriving';badgeClass='b-arriving';badgeText=t.badge_arriving;
    } else if(minsToArr>0&&minsToArr<=driveMinutes+2){
      rowClass='soon';badgeClass='b-soon';badgeText=t.badge_soon;
    } else if(minsToArr>0&&canBefore){
      rowClass='clear';badgeClass='b-before';badgeText=t.badge_before;
    } else if(minsToArr>0){
      rowClass='clear';badgeClass='b-clear';badgeText=t.badge_clear;
    } else {
      rowClass='past';badgeClass='b-past';badgeText=t.badge_past;
    }

    const maxCars=FLEET_INFO[ship]?.maxCars||411;
    const loadPct=dep.estimatedCars?Math.round((dep.estimatedCars/maxCars)*100):60;
    const loadClass=`load-${dep.loadLevel||'moderate'}`;
    const loadLabel=dep.loadLevel==='low'?t.low:dep.loadLevel==='heavy'?t.heavy:t.moderate;

    const delayStr=isDelayed
      ?(dep.delayMins>0?` (+${dep.delayMins}m)`:`(${dep.delayMins}m)`):'';
    const aisTag=dep.source==='ais'?`<span class="ferry-ship-tag">AIS</span>`:'';

    rows+=`<div class="ferry-card ${rowClass}">
      <div class="ferry-icon">${emoji}</div>
      <div class="ferry-body">
        <div class="ferry-ship">${ship} ${aisTag}<span style="color:var(--text3)">${routeStr}</span></div>
        <div class="ferry-times">${t.arrives} ${fmt(arr)}${delayStr} · ${t.freefrom} ${freeTime}</div>
        <div class="ferry-meta">
          <span>🚗 ${dep.estimatedCars||'~250'} ${t.carsEst}</span>
          <span>⏱ ${t.unload} ${unload} ${t.min}</span>
        </div>
        <div class="${loadClass} load-bar-wrap">
          <div class="load-bar-track"><div class="load-bar-fill" style="width:${loadPct}%"></div></div>
          <div class="load-label">${loadLabel}</div>
        </div>
      </div>
      <span class="ferry-badge ${badgeClass}">${badgeText}</span>
    </div>`;
  });

  document.getElementById('timeline').innerHTML=rows||`<div style="color:var(--text3);font-size:14px;padding:8px 0">Ingen afgange fundet</div>`;
  document.getElementById('tl-label').textContent=t.arrivals;
  const btn=document.getElementById('show-all-btn');
  btn.textContent=relevant.length>5?(showAllFerries?t.showLess:t.showAll+` (${relevant.length})`):'' ;

  renderAssumptions();
}

function toggleShowAll(){
  showAllFerries=!showAllFerries;
  if(lastData)renderAll(lastData);
}

// ══════════════════════════════════════════════════════════════
function renderChart(dayIndex){
  const t=T[lang];
  const isWE=[0,6].includes(dayIndex);
  const traffic=isWE?TRAFFIC.weekend:TRAFFIC.weekday;
  const now=new Date();
  const currentHour=now.getHours();

  // Day tabs
  const tabHTML=T[lang].days.map((d,i)=>{
    const active=i===selectedDay?'active':'';
    return`<button class="day-tab ${active}" onclick="selectDay(${i})">${d}</button>`;
  }).join('');
  document.getElementById('day-tabs').innerHTML=tabHTML;

  // Hours 6-21
  const hours=Array.from({length:16},(_,i)=>i+6);
  const maxVal=Math.max(...hours.map(h=>traffic[h]));

  const bars=hours.map(h=>{
    const v=traffic[h]/maxVal;
    const isCurrent=h===currentHour&&dayIndex===now.getDay();
    const pct=Math.round(v*100);
    const bg=isCurrent?'var(--teal)':v>0.8?'#4A6B80':v>0.5?'#2E4A5A':'#1C2E42';
    return`<div class="chart-bar-col">
      <div class="chart-bar${isCurrent?' current':''}" style="height:${Math.max(3,pct*0.56)}px;background:${bg}"></div>
    </div>`;
  }).join('');

  document.getElementById('chart-wrap').innerHTML=bars;
  document.getElementById('chart-label').textContent=t.chartLabel;

  // Find peak
  let peakHour=6,peakVal=0;
  hours.forEach(h=>{if(traffic[h]>peakVal){peakVal=traffic[h];peakHour=h;}});
  document.getElementById('chart-peak').innerHTML=
    `<div class="chart-peak-dot"></div><span style="color:var(--text2);font-size:11px">${t.peak} ${peakHour}–${peakHour+2}</span>`;
}

function selectDay(i){selectedDay=i;renderChart(i);}

// ══════════════════════════════════════════════════════════════
// ASSUMPTIONS PANEL
// ══════════════════════════════════════════════════════════════
function renderAssumptions(){
  const t=T[lang];
  const addr=()=>{try{return localStorage.getItem('gniben_addr')||'';}catch(e){return'';}};
  const a=addr();
  const rows=[
    [t.a_sailAR,`${C.sailAR} min`],
    [t.a_sailER,`${C.sailER} min`],
    [t.a_unload,`${C.defaultUnload} min (+varierer med bilantal)`],
    [t.a_drive, a?`~${driveMinutes} min (${a})`:`${C.defaultDrive} min (standard)`],
    [t.a_ver,   C.version],
    [t.a_upd,   C.lastUpdated],
  ];
  document.getElementById('assumptions-rows').innerHTML=
    rows.map(([k,v])=>`<div class="arow"><span class="arow-key">${k}</span><span class="arow-val">${v}</span></div>`).join('');
  document.getElementById('assumptions-note').textContent=t.assumptionsNote;
  document.getElementById('assumptions-title').textContent=t.assumptionsTitle;
}

function toggleAssumptions(){
  const b=document.getElementById('assumptions-body');
  const ch=document.getElementById('chevron');
  b.classList.toggle('open');
  ch.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════════════════════════
function setLang(l){
  lang=l;
  document.getElementById('btn-da').classList.toggle('active',l==='da');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('h-title').textContent=T[l].title;
  document.getElementById('refresh-label').textContent=T[l].refresh;
  document.getElementById('addr-title-label').textContent=T[l].addrTitle;
  document.getElementById('save-btn').textContent=T[l].save;
  document.getElementById('disclaimer').innerHTML=T[l].disclaimer;
  const addr=document.getElementById('addr-input').value;
  updateAddrUI(addr);
  updateClock();
  if(lastData)renderAll(lastData);
  renderChart(selectedDay);
}

// ══════════════════════════════════════════════════════════════
// ONBOARDING
// ══════════════════════════════════════════════════════════════
function checkOnboarding(){
  let seen=false; try{seen=!!localStorage.getItem('gniben_addr')||!!localStorage.getItem('ob_seen');}catch(e){}
  if(seen) return;
  const ob=document.getElementById('onboarding');
  const t=T[lang];
  ob.classList.remove('hidden');
  document.getElementById('ob-title').textContent=t.ob_title;
  document.getElementById('ob-sub').textContent=t.ob_sub;
  document.getElementById('ob-label').textContent=t.ob_label;
  document.getElementById('ob-btn').textContent=t.ob_btn;
  document.getElementById('ob-skip').textContent=t.ob_skip;
  document.getElementById('ob-note').textContent=t.ob_note;
  // focus input after short delay (keyboard)
  setTimeout(()=>document.getElementById('ob-input').focus(),400);
  // allow Enter key
  document.getElementById('ob-input').addEventListener('keydown',e=>{
    if(e.key==='Enter') onboardingSave();
  });
}

function onboardingSave(){
  const v=document.getElementById('ob-input').value.trim();
  if(v){
    try{localStorage.setItem('gniben_addr',v);}catch(e){}
    driveMinutes=estimateDrive(v);
    // Sync to main addr field
    document.getElementById('addr-input').value=v;
    document.getElementById('addr-saved').style.display='block';
    document.getElementById('addr-saved').textContent=T[lang].saved;
    updateAddrUI(v);
  }
  dismissOnboarding();
}

function onboardingSkip(){
  try{localStorage.setItem('ob_seen','1');}catch(e){}
  dismissOnboarding();
}

function dismissOnboarding(){
  const ob=document.getElementById('onboarding');
  ob.style.opacity='0';
  ob.style.transition='opacity .25s';
  setTimeout(()=>ob.classList.add('hidden'),260);
  if(lastData) renderAll(lastData);
}

// ══════════════════════════════════════════════════════════════
// INSTALL BANNER
// ══════════════════════════════════════════════════════════════
function checkInstall(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  let dismissed=false;try{dismissed=!!localStorage.getItem('install_dismissed');}catch(e){}
  if(isIOS&&!isStandalone&&!dismissed){
    const b=document.getElementById('install-banner');
    b.textContent=T[lang].install;
    b.style.display='block';
  }
}
function dismissInstall(){
  document.getElementById('install-banner').style.display='none';
  try{localStorage.setItem('install_dismissed','1');}catch(e){}
}
